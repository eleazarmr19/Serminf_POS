<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Promedio de Calificaciones</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1d4350, #a43931);
        }

        .card {
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn-custom {
            background-color: #a43931;
            color: white;
            font-weight: bold;
        }

        .btn-custom:hover {
            background-color: #7a2d28;
        }
    </style>
</head>
<body>

    <div class="card col-md-4">
        <h3 class="text-center mb-4">Promedio de Calificaciones</h3>

        <div class="mb-3">
            <label class="form-label">Calificación 1</label>
            <input type="number" class="form-control" id="cal1">
        </div>

        <div class="mb-3">
            <label class="form-label">Calificación 2</label>
            <input type="number" class="form-control" id="cal2">
        </div>

        <div class="mb-3">
            <label class="form-label">Calificación 3</label>
            <input type="number" class="form-control" id="cal3">
        </div>

        <div class="mb-3">
            <label class="form-label">Calificación 4</label>
            <input type="number" class="form-control" id="cal4">
        </div>

        <div class="mb-3">
            <label class="form-label">Promedio</label>
            <input type="text" class="form-control" id="promedio" readonly>
        </div>

        <div class="d-grid">
            <button class="btn btn-custom">Calcular Promedio</button>
        </div>
    </div>

</body>
    <script>
        function calcularpromedio () {
         let cal1 = parseFloat(document.getElementById("cal1").value);
         let cal2 = parseFloat(document.getElementById("cal2").value);
         let cal3 = parseFloat(document.getElementById("cal3").value);
         let cal4 = parseFloat(document.getElementById("cal4").value);         
         let promedio = (cal1 + cal2 + cal3 + cal4)/4;
         document.getElementById("promedio").value = promedio;
        }
    </script>
</html>
