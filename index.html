<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serminf POS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--bg:#f4f6f9;--sidebar:#111827;--card:#fff;--primary:#2563eb;--text:#111827;}
body{background:var(--bg);color:var(--text);} 
.sidebar{width:230px;height:100vh;position:fixed;background:var(--sidebar);padding:20px;color:#fff;}
.main{margin-left:250px;padding:25px;}
.card{background:var(--card);border:none;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.05);} 
.product{cursor:pointer;transition:.2s;border:1px solid #eee;}
.product:hover{transform:translateY(-3px);border-color:var(--primary);} 
</style>
</head>
<body>

<div class="sidebar">
  <h4>Serminf POS</h4>
  <button class="btn btn-outline-light w-100 mb-2" onclick="showView('ventas')">Ventas</button>
  <button class="btn btn-outline-light w-100 mb-2" onclick="showView('productos')">Productos</button>
  <button class="btn btn-outline-light w-100 mb-2" onclick="showView('historial')">Historial</button>
</div>

<div class="main">

<!-- LOGIN -->
<div id="loginView">
  <div class="card p-4" style="max-width:400px;margin:auto;">
    <h5>Login</h5>
    <input id="user" class="form-control mb-2" placeholder="Usuario">
    <input id="pass" type="password" class="form-control mb-2" placeholder="Contraseña">
    <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
  </div>
</div>

<!-- VENTAS -->
<div id="ventasView" style="display:none;">
  <input type="text" id="search" class="form-control mb-3" placeholder="Buscar producto..." onkeyup="renderProducts()">
  <div class="row">
    <div class="col-md-8"><div class="row" id="products"></div></div>
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Ticket</h5>
        <ul id="cart" class="list-group mb-3"></ul>
        <div>Total: $<span id="total">0</span></div>
        <button class="btn btn-success w-100 mt-2" onclick="printTicket()">Imprimir</button>
        <button class="btn btn-primary w-100 mt-2" onclick="checkout()">Cobrar</button>
      </div>
    </div>
  </div>
</div>

<!-- PRODUCTOS -->
<div id="productosView" style="display:none;">
  <div class="d-flex justify-content-between mb-3">
    <h5>Productos</h5>
    <button class="btn btn-success" onclick="openModal()">+ Agregar</button>
  </div>
  <table class="table table-striped">
    <thead><tr><th>Nombre</th><th>Precio</th><th>Acciones</th></tr></thead>
    <tbody id="productTable"></tbody>
  </table>
</div>

<!-- HISTORIAL -->
<div id="historialView" style="display:none;">
  <h5>Historial de Ventas</h5>
  <ul id="salesList" class="list-group"></ul>
</div>

</div>

<!-- MODAL -->
<div class="modal" tabindex="-1" id="modal">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5>Producto</h5></div>
    <div class="modal-body">
      <input type="hidden" id="editIndex">
      <input id="name" class="form-control mb-2" placeholder="Nombre">
      <input id="price" type="number" class="form-control" placeholder="Precio">
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveProduct()">Guardar</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    </div>
  </div></div>
</div>

<script>
let products=[{name:"Coca Cola",price:20},{name:"Sabritas",price:18}];
let cart=[];let sales=[];

function login(){
  let u=document.getElementById('user').value;
  let p=document.getElementById('pass').value;
  if(u==='admin' && p==='1234'){
    document.getElementById('loginView').style.display='none';
    showView('ventas');
  } else alert('Datos incorrectos');
}

function showView(v){
  ['ventas','productos','historial'].forEach(x=>document.getElementById(x+'View').style.display='none');
  document.getElementById(v+'View').style.display='block';
  if(v==='productos')renderTable();
  if(v==='historial')renderSales();
}

function renderProducts(){
  let s=document.getElementById('search').value.toLowerCase();
  let c=document.getElementById('products');c.innerHTML='';
  products.filter(p=>p.name.toLowerCase().includes(s)).forEach((p,i)=>{
    c.innerHTML+=`<div class='col-md-4 mb-3'><div class='card p-3 product' onclick='addToCart(${i})'><h6>${p.name}</h6><small>$${p.price}</small></div></div>`;
  });
}

function addToCart(i){cart.push(products[i]);renderCart();}

function removeFromCart(i){cart.splice(i,1);renderCart();}

function renderCart(){
  let l=document.getElementById('cart');l.innerHTML='';let t=0;
  cart.forEach((p,i)=>{t+=p.price;l.innerHTML+=`<li class='list-group-item d-flex justify-content-between'>${p.name}<span>$${p.price}</span><button class='btn btn-sm btn-danger' onclick='removeFromCart(${i})'>X</button></li>`});
  document.getElementById('total').innerText=t;
}

function checkout(){
  if(cart.length===0)return alert('No hay productos');
  let total=document.getElementById('total').innerText;
  sales.push({date:new Date().toLocaleString(),items:[...cart],total});
  localStorage.setItem('sales',JSON.stringify(sales));
  cart=[];renderCart();alert('Venta guardada');
}

function printTicket(){
  let win=window.open('','','width=300');
  win.document.write('<h3>Ticket</h3>');
  cart.forEach(p=>win.document.write(`<p>${p.name} - $${p.price}</p>`));
  win.document.write('<hr>Total: $'+document.getElementById('total').innerText);
  win.print();
}

function renderSales(){
  let l=document.getElementById('salesList');l.innerHTML='';
  sales.forEach(s=>{
    l.innerHTML+=`<li class='list-group-item'>${s.date} - $${s.total}</li>`;
  });
}

function renderTable(){
  let t=document.getElementById('productTable');t.innerHTML='';
  products.forEach((p,i)=>{
    t.innerHTML+=`<tr><td>${p.name}</td><td>$${p.price}</td><td>
    <button class='btn btn-sm btn-warning' onclick='editProduct(${i})'>Editar</button>
    <button class='btn btn-sm btn-danger' onclick='deleteProduct(${i})'>Eliminar</button>
    </td></tr>`;
  });
}

function openModal(){document.getElementById('modal').style.display='block';}
function closeModal(){document.getElementById('modal').style.display='none';clearForm();}

function saveProduct(){
  let name=document.getElementById('name').value;
  let price=parseFloat(document.getElementById('price').value);
  let i=document.getElementById('editIndex').value;
  if(i==='') products.push({name,price}); else products[i]={name,price};
  localStorage.setItem('products',JSON.stringify(products));
  closeModal();renderTable();renderProducts();
}

function editProduct(i){openModal();document.getElementById('name').value=products[i].name;document.getElementById('price').value=products[i].price;document.getElementById('editIndex').value=i;}

function deleteProduct(i){if(confirm('Eliminar producto?')){products.splice(i,1);localStorage.setItem('products',JSON.stringify(products));renderTable();renderProducts();}}

function clearForm(){document.getElementById('name').value='';document.getElementById('price').value='';document.getElementById('editIndex').value='';}

function loadData(){
  let p=JSON.parse(localStorage.getItem('products'));
  let s=JSON.parse(localStorage.getItem('sales'));
  if(p) products=p;
  if(s) sales=s;
}

loadData();renderProducts();renderTable();
</script>

</body>
</html>
