<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serminf POS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f6f9;}
.sidebar{width:220px;height:100vh;position:fixed;background:#111827;color:#fff;padding:15px;}
.main{margin-left:240px;padding:20px;}
.product{cursor:pointer;transition:.2s;}
.product:hover{transform:scale(1.03);}
</style>
</head>

<body>

<div class="sidebar">
<h4>POS</h4>
<button class="btn btn-outline-light w-100 mb-2" onclick="showView('ventas')">Ventas</button>
<button class="btn btn-outline-light w-100 mb-2" onclick="showView('productos')">Productos</button>
<button class="btn btn-outline-light w-100 mb-2" onclick="showView('historial')">Historial</button>
<button class="btn btn-outline-light w-100 mb-2" onclick="showView('corte')">Corte</button>
<button class="btn btn-warning w-100 mt-3" onclick="syncData()">Sincronizar</button>
</div>

<div class="main">

<!-- VENTAS -->
<div id="ventasView">
<input id="search" class="form-control mb-2" placeholder="Buscar..." onkeyup="renderProducts()">
<input id="barcode" class="form-control mb-3" placeholder="Código barras" onkeyup="scanBarcode(event)">

<div class="row">
<div class="col-md-8">
<div class="row" id="products"></div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Ticket</h5>
<ul id="cart" class="list-group"></ul>
<h4>Total: $<span id="total">0</span></h4>
<button class="btn btn-success w-100 mt-2" onclick="printTicket()">Imprimir</button>
<button class="btn btn-primary w-100 mt-2" onclick="checkout()">Cobrar</button>
</div>
</div>
</div>
</div>

<!-- PRODUCTOS -->
<div id="productosView" style="display:none;">
<button class="btn btn-success mb-2" onclick="openModal()">+ Agregar</button>
<table class="table">
<thead><tr><th>Nombre</th><th>Cat</th><th>Precio</th><th>Stock</th><th>Código</th><th></th></tr></thead>
<tbody id="productTable"></tbody>
</table>
</div>

<!-- HISTORIAL -->
<div id="historialView" style="display:none;">
<ul id="salesList" class="list-group"></ul>
</div>

<!-- CORTE -->
<div id="corteView" style="display:none;">
<h5>Corte del día</h5>
<div id="corteData"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#fff;padding:20px;border-radius:10px;">
<input type="hidden" id="editIndex">
<input id="name" class="form-control mb-2" placeholder="Nombre">
<input id="category" class="form-control mb-2" placeholder="Categoría">
<input id="price" type="number" class="form-control mb-2" placeholder="Precio">
<input id="stock" type="number" class="form-control mb-2" placeholder="Stock">
<input id="code" class="form-control mb-2" placeholder="Código barras">
<button onclick="saveProduct()" class="btn btn-primary w-100">Guardar</button>
<button onclick="closeModal()" class="btn btn-secondary w-100 mt-2">Cancelar</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let cart = [];

// ===== SAVE =====
function saveData(){
 localStorage.setItem("products", JSON.stringify(products));
 localStorage.setItem("sales", JSON.stringify(sales));
}

// ===== VIEWS =====
function showView(v){
 ventasView.style.display="none";
 productosView.style.display="none";
 historialView.style.display="none";
 corteView.style.display="none";
 document.getElementById(v+"View").style.display="block";

 if(v==="historial") renderSales();
 if(v==="corte") renderCorte();
}

// ===== PRODUCTOS =====
function renderProducts(){
 let s = search.value.toLowerCase();
 let cont = document.getElementById("products");
 cont.innerHTML = "";

 products.filter(p=>p.name.toLowerCase().includes(s)).forEach((p,i)=>{
  cont.innerHTML += `
  <div class="col-md-4 mb-2">
   <div class="card p-2 product" onclick="addToCart(${i})">
    <b>${p.name}</b><br>
    Stock: ${p.stock}<br>
    $${p.price}
   </div>
  </div>`;
 });
}

function renderTable(){
 let t = document.getElementById("productTable");
 t.innerHTML = "";

 products.forEach((p,i)=>{
  t.innerHTML += `
  <tr>
   <td>${p.name}</td>
   <td>${p.category}</td>
   <td>${p.price}</td>
   <td>${p.stock}</td>
   <td>${p.code}</td>
   <td>
    <button onclick="editProduct(${i})">✏️</button>
    <button onclick="deleteProduct(${i})">❌</button>
   </td>
  </tr>`;
 });
}

function saveProduct(){
 let i = editIndex.value;

 let obj = {
  id: i ? products[i].id : Date.now(),
  name: name.value,
  category: category.value,
  price: +price.value,
  stock: +stock.value,
  code: code.value
 };

 if(i==="") products.push(obj);
 else products[i] = obj;

 saveData();
 closeModal();
 renderProducts();
 renderTable();
}

function deleteProduct(i){
 products.splice(i,1);
 saveData();
 renderProducts();
 renderTable();
}

function editProduct(i){
 openModal();
 name.value = products[i].name;
 category.value = products[i].category;
 price.value = products[i].price;
 stock.value = products[i].stock;
 code.value = products[i].code;
 editIndex.value = i;
}

// ===== MODAL =====
function openModal(){ modal.style.display="block"; }
function closeModal(){ modal.style.display="none"; clearForm(); }

function clearForm(){
 name.value=""; category.value=""; price.value=""; stock.value=""; code.value=""; editIndex.value="";
}

// ===== CARRITO =====
function addToCart(i){
 if(products[i].stock<=0) return alert("Sin stock");
 cart.push(products[i]);
 renderCart();
}

function removeFromCart(i){
 cart.splice(i,1);
 renderCart();
}

function renderCart(){
 let l = document.getElementById("cart");
 l.innerHTML = "";
 let t = 0;

 cart.forEach((p,i)=>{
  t += p.price;
  l.innerHTML += `
  <li class="list-group-item d-flex justify-content-between">
   ${p.name} $${p.price}
   <button class="btn btn-danger btn-sm" onclick="removeFromCart(${i})">X</button>
  </li>`;
 });

 total.innerText = t;
}

// ===== VENTAS =====
function checkout(){
 if(!cart.length) return alert("Carrito vacío");

 let totalVal = +total.innerText;

 cart.forEach(item=>{
  let p = products.find(x=>x.id===item.id);
  p.stock--;
 });

 sales.push({
  id: Date.now(),
  date: new Date().toLocaleString(),
  items: [...cart],
  total: totalVal
 });

 saveData();

 cart = [];
 renderCart();
 renderProducts();
 renderTable();

 alert("Venta guardada");
}

// ===== HISTORIAL =====
function renderSales(){
 let l = document.getElementById("salesList");
 l.innerHTML = "";

 sales.forEach(s=>{
  l.innerHTML += `<li class="list-group-item">${s.date} - $${s.total}</li>`;
 });
}

// ===== CORTE =====
function renderCorte(){
 let today = new Date().toLocaleDateString();
 let totalDia = 0;
 let ventasDia = 0;

 sales.forEach(s=>{
  if(s.date.includes(today)){
   totalDia += +s.total;
   ventasDia++;
  }
 });

 corteData.innerHTML = `
  Ventas: ${ventasDia}<br>
  Total: $${totalDia}
 `;
}

// ===== BARCODE =====
function scanBarcode(e){
 if(e.key==="Enter"){
  let i = products.findIndex(p=>p.code===barcode.value);
  if(i>=0) addToCart(i);
  barcode.value="";
 }
}

// ===== TICKET =====
function printTicket(){
 let w = window.open("", "", "width=300");
 w.document.write("<h3>TIENDA</h3><hr>");
 cart.forEach(p=>w.document.write(`<p>${p.name} $${p.price}</p>`));
 w.document.write("<hr>Total: $"+total.innerText);
 w.print();
}

// ===== SYNC =====
function syncData(){
 if(!navigator.onLine) return alert("Sin internet");

 fetch("https://TU-SERVIDOR/api.php",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({products,sales})
 })
 .then(()=>alert("Sincronizado"))
 .catch(()=>alert("Error servidor"));
}

// INIT
renderProducts();
renderTable();
</script>

</body>
</html>
