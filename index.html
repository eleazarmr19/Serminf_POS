<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serminf POS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f6f9;}
.sidebar{width:220px;height:100vh;position:fixed;background:#111827;color:#fff;padding:15px;}
.main{margin-left:240px;padding:20px;}
.product{cursor:pointer;transition:.2s;}
.product:hover{transform:scale(1.03);}
</style>
</head>

<body>

<div class="sidebar">
<h4>Serminf POS</h4>
<button class="btn btn-outline-light w-100 mb-2" onclick="showView('ventas')">Ventas</button>
<button class="btn btn-outline-light w-100 mb-2" onclick="showView('productos')">Productos</button>
<button class="btn btn-outline-light w-100 mb-2" onclick="showView('historial')">Historial</button>
</div>

<div class="main">

<!-- VENTAS -->
<div id="ventasView">
<input id="search" class="form-control mb-2" placeholder="Buscar..." onkeyup="renderProducts()">
<input id="barcode" class="form-control mb-3" placeholder="Código de barras" onkeyup="scanBarcode(event)">

<div class="row">
<div class="col-md-8">
<div class="row" id="products"></div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Ticket</h5>
<ul id="cart" class="list-group mb-2"></ul>
<h4>Total: $<span id="total">0</span></h4>
<button class="btn btn-success w-100 mt-2" onclick="printTicket()">Imprimir</button>
<button class="btn btn-primary w-100 mt-2" onclick="checkout()">Cobrar</button>
</div>
</div>
</div>
</div>

<!-- PRODUCTOS -->
<div id="productosView" style="display:none;">
<div class="d-flex justify-content-between mb-3">
<h5>Productos</h5>
<button class="btn btn-success" onclick="openModal()">+ Agregar</button>
</div>

<table class="table">
<thead><tr><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Código</th><th></th></tr></thead>
<tbody id="productTable"></tbody>
</table>
</div>

<!-- HISTORIAL -->
<div id="historialView" style="display:none;">
<h5>Historial</h5>
<ul id="salesList" class="list-group"></ul>
</div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%); background:white; padding:20px; border-radius:10px;">
<input type="hidden" id="editIndex">
<input id="name" class="form-control mb-2" placeholder="Nombre">
<input id="category" class="form-control mb-2" placeholder="Categoría">
<input id="price" type="number" class="form-control mb-2" placeholder="Precio">
<input id="code" class="form-control mb-2" placeholder="Código de barras">
<button class="btn btn-primary w-100" onclick="saveProduct()">Guardar</button>
<button class="btn btn-secondary w-100 mt-2" onclick="closeModal()">Cancelar</button>
</div>

<script>
let db;
let dbReady = false;

let products = [];
let sales = [];
let cart = [];

// ===== INIT DB =====
let req = indexedDB.open("posDB",1);

req.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("products",{keyPath:"id",autoIncrement:true});
  db.createObjectStore("sales",{keyPath:"id",autoIncrement:true});
};

req.onsuccess = e => {
  db = e.target.result;
  dbReady = true;
  loadData();
};

// ===== SAVE =====
function save(store,data){
  let tx = db.transaction(store,"readwrite");
  let s = tx.objectStore(store);
  s.clear();
  data.forEach(d => s.add(d));
}

// ===== VIEWS =====
function showView(v){
  ventasView.style.display="none";
  productosView.style.display="none";
  historialView.style.display="none";
  document.getElementById(v+"View").style.display="block";
  if(v==="historial") renderSales();
}

// ===== PRODUCTS =====
function renderProducts(){
  let cont = document.getElementById("products");
  let s = document.getElementById("search").value.toLowerCase();

  cont.innerHTML = "";

  products.filter(p=>p.name.toLowerCase().includes(s)).forEach((p,i)=>{
    cont.innerHTML += `
    <div class="col-md-4 mb-2">
      <div class="card p-2 product" onclick="addToCart(${i})">
        <b>${p.name}</b><br>
        <small>${p.category}</small><br>
        $${p.price}
      </div>
    </div>`;
  });
}

function renderTable(){
  let t = document.getElementById("productTable");
  t.innerHTML = "";

  products.forEach((p,i)=>{
    t.innerHTML += `
    <tr>
      <td>${p.name}</td>
      <td>${p.category}</td>
      <td>$${p.price}</td>
      <td>${p.code}</td>
      <td>
        <button onclick="editProduct(${i})">✏️</button>
        <button onclick="deleteProduct(${i})">❌</button>
      </td>
    </tr>`;
  });
}

function saveProduct(){
  if(!dbReady) return alert("Cargando sistema...");

  let i = document.getElementById("editIndex").value;

  let obj = {
    name: name.value,
    category: category.value,
    price: +price.value,
    code: code.value
  };

  if(i==="") products.push(obj);
  else products[i] = obj;

  save("products", products);
  closeModal();
  renderProducts();
  renderTable();
}

function deleteProduct(i){
  products.splice(i,1);
  save("products", products);
  renderProducts();
  renderTable();
}

function editProduct(i){
  openModal();
  name.value = products[i].name;
  category.value = products[i].category;
  price.value = products[i].price;
  code.value = products[i].code;
  editIndex.value = i;
}

// ===== MODAL =====
function openModal(){ document.getElementById("modal").style.display="block"; }
function closeModal(){ document.getElementById("modal").style.display="none"; clearForm(); }

function clearForm(){
  name.value=""; category.value=""; price.value=""; code.value=""; editIndex.value="";
}

// ===== CART =====
function addToCart(i){ cart.push(products[i]); renderCart(); }
function removeFromCart(i){ cart.splice(i,1); renderCart(); }

function renderCart(){
  let l = document.getElementById("cart");
  l.innerHTML = "";
  let t = 0;

  cart.forEach((p,i)=>{
    t += p.price;
    l.innerHTML += `
    <li class="list-group-item d-flex justify-content-between">
      ${p.name} $${p.price}
      <button class="btn btn-sm btn-danger" onclick="removeFromCart(${i})">X</button>
    </li>`;
  });

  total.innerText = t;
}

// ===== BARCODE =====
function scanBarcode(e){
  if(e.key==="Enter"){
    let val = barcode.value;
    let i = products.findIndex(p=>p.code===val);
    if(i>=0) addToCart(i);
    barcode.value="";
  }
}

// ===== SALES =====
function checkout(){
  if(!cart.length) return alert("Carrito vacío");

  let total = document.getElementById("total").innerText;

  sales.push({
    date:new Date().toLocaleString(),
    items:[...cart],
    total
  });

  save("sales", sales);
  cart=[];
  renderCart();
  alert("Venta guardada");
}

// ===== HISTORY =====
function renderSales(){
  let l = document.getElementById("salesList");
  l.innerHTML = "";

  sales.forEach(s=>{
    l.innerHTML += `<li class="list-group-item">${s.date} - $${s.total}</li>`;
  });
}

// ===== TICKET =====
function printTicket(){
  let w = window.open("","","width=300");
  w.document.write("<h3>TIENDA</h3><hr>");
  cart.forEach(p=>w.document.write(`<p>${p.name} $${p.price}</p>`));
  w.document.write("<hr><h4>Total: $"+total.innerText+"</h4>");
  w.print();
}

// ===== LOAD =====
function loadData(){
  let tx = db.transaction(["products","sales"],"readonly");

  tx.objectStore("products").getAll().onsuccess = e=>{
    products = e.target.result;
    renderProducts();
    renderTable();
  };

  tx.objectStore("sales").getAll().onsuccess = e=>{
    sales = e.target.result;
  };
}
</script>

</body>
</html>
