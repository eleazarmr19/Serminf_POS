<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Suma de Números</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .card {
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn-custom {
            background-color: #2a5298;
            color: white;
            font-weight: bold;
        }

        .btn-custom:hover {
            background-color: #1e3c72;
        }
    </style>
</head>
<body>

    <div class="card col-md-4">
        <h3 class="text-center mb-4">Suma de Números</h3>

        <div class="mb-3">
            <label class="form-label">Número 1</label>
            <input type="text" class="form-control" id="num1">
        </div>

        <div class="mb-3">
            <label class="form-label">Número 2</label>
            <input type="text" class="form-control" id="num2">
        </div>

        <div class="mb-3">
            <label class="form-label">Resultado</label>
            <input type="text" class="form-control" id="resultado" readonly>
        </div>

        <div class="d-grid">
            <button class="btn btn-custom">Calcular Suma</button>
        </div>
    </div>

</body>
    <script>
       let a,b;
        a="Hola";
        b= "Eleazar";
        alert(a + " " + b + " Bienvenido");
    </script>
</html>
